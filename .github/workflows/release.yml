name: release

# Single source of truth for the plugin version is the release TAG, not feature PRs.
# Pushing `vX.Y.Z` writes that version into .claude-plugin/plugin.json on master (the
# ref autoUpdate consumers track) and publishes a GitHub release. Feature PRs never
# touch the version line — which also kills the cross-PR merge conflict on it.
on:
  push:
    tags: ['v*']

permissions:
  contents: write # push the version bump back to master + create the release

jobs:
  set-version:
    runs-on: ubuntu-latest
    steps:
      # Check out master (not the tag): the bump must land on the branch consumers
      # pull, and the tag is expected to point at master HEAD anyway.
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Derive version from tag
        id: ver
        run: |
          set -euo pipefail
          raw="${GITHUB_REF_NAME#v}" # strip optional leading v
          # Guard: refuse to write a non-semver string into plugin.json.
          echo "$raw" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$' \
            || { echo "::error::tag '$GITHUB_REF_NAME' is not semver (vX.Y.Z)"; exit 1; }
          echo "version=$raw" >> "$GITHUB_OUTPUT"

      - name: Write version into plugin.json
        run: |
          set -euo pipefail
          jq --arg v "${{ steps.ver.outputs.version }}" '.version = $v' \
            .claude-plugin/plugin.json > .claude-plugin/plugin.json.tmp
          mv .claude-plugin/plugin.json.tmp .claude-plugin/plugin.json

      - name: Commit bump to master (idempotent)
        run: |
          set -euo pipefail
          # No-op if plugin.json is already at this version (re-run, or hand-set).
          if git diff --quiet -- .claude-plugin/plugin.json; then
            echo "plugin.json already at ${{ steps.ver.outputs.version }} — nothing to commit"
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .claude-plugin/plugin.json
          git commit -m "chore(release): v${{ steps.ver.outputs.version }}"
          git push origin HEAD:master

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
